<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <defs>
    <radialGradient id="abelGlow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFF4CF" />
      <stop offset="45%" stop-color="#F7C750" />
      <stop offset="100%" stop-color="#B17713" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1a0f05" flood-opacity="0.4" />
    </filter>
    <clipPath id="logoMask">
      <circle cx="256" cy="220" r="120" />
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="238" fill="url(#abelGlow)" filter="url(#softShadow)" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="12" />

  <!-- Company logo inside a golden medallion -->
  <circle cx="256" cy="220" r="128" fill="rgba(0,0,0,0.15)" />
  <circle cx="256" cy="220" r="120" fill="#FFF7E3" stroke="#E0B547" stroke-width="10" />
  <g clip-path="url(#logoMask)">
    <circle cx="256" cy="220" r="120" fill="#F8DFC0" />
    <image
      href="/assets/logo.png"
      x="136"
      y="100"
      width="240"
      height="240"
      preserveAspectRatio="xMidYMid slice"
    />
  </g>

  <!-- Brand name -->
  <text
    x="50%"
    y="400"
    text-anchor="middle"
    font-family="'Noto Sans Ethiopic','Merriweather',serif"
    font-size="82"
    fill="#3B190B"
    letter-spacing="4"
  >
    አቤል በገና
  </text>
</svg>

